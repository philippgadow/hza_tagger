# Converter configuration for H→Z(ll)+a(had) signal sample
# ──────────────────────────────────────────────────────────

name: hza_signal

# Input files — local paths or xrootd URIs
# One file per line; use {XROOTD_SERVER} env var for site-specific prefix
files:
    # background files (~300k event per file)
  - /pnfs/desy.de/cms/tier2/store/user/pgadow/HZa_backgrounds/RunIII2024Summer24BTVNanoAllPF/DYto2Mu_Bin-MLL-50to120_TuneCP5_13p6TeV_powheg-pythia8/RunIII2024Summer24BTVNanoAllPF/260225_105208/0000/*.root 
    # signal sample files (~1k events per file)
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA0_5GeV/RunIII2024Summer24HZANanoAllPF/260504_110127/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA0_75GeV/RunIII2024Summer24HZANanoAllPF/260504_110137/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA1_0GeV/RunIII2024Summer24HZANanoAllPF/260504_110146/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA1_5GeV/RunIII2024Summer24HZANanoAllPF/260504_110155/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA2_0GeV/RunIII2024Summer24HZANanoAllPF/260504_110204/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA2_5GeV/RunIII2024Summer24HZANanoAllPF/260504_110213/0000/*.root
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA3_0GeV/RunIII2024Summer24HZANanoAllPF/260504_110222/0000/*.root  
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA3_5GeV/RunIII2024Summer24HZANanoAllPF/260504_110231/0000/*.root 
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA4_0GeV/RunIII2024Summer24HZANanoAllPF/260504_110240/0000/*.root 
    #- /pnfs/desy.de/cms/tier2/store/user/mjalalva/ggH_HZa_signals/RunIII2024Summer24/ggH_HZa_mA8_0GeV/RunIII2024Summer24HZANanoAllPF/260504_110249/0000/*.root 
  # - root://cms-xrd-global.cern.ch//store/...

# TTree name inside the ROOT file
tree: Events

# Output
output:
  train: data/train.h5
  val:   data/val.h5
  test:  data/test.h5

# Fraction of events per split (must sum to 1.0)
split_fractions:
  train: 0.70
  val:   0.15
  test:  0.15

# Jet selection (overrides common/variables.py defaults if set)
jet_selection:
  pt_min:  20.0   # GeV
  eta_max: 2.5
  jet_id_min: 2

# Number of PFCands (tracks) stored per jet
n_tracks: 40

# Maximum number of events to read per file (null = all events).
# Useful to cap large background files, e.g. set 200000 for btvNano.
max_events_per_file: 200000 # background 
#max_events_per_file: 5000 # signal

# Coffea chunk size (events per chunk).
# Larger = fewer NanoEventsFactory calls = faster; keep below ~1 GB RAM per chunk.
chunk_size: 5000

# NanoAOD schema: "NanoAODSchema" or "PFNanoAODSchema"
# Use PFNanoAODSchema if your file has the full PFCand branches
nano_schema: PFNanoAODSchema
