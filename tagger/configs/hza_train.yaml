# SALT 0.11 training config for the HZa binary tagger
# Run with: salt fit --config tagger/configs/hza_train.yaml
#
# Requires SALT to be checked out at tagger/salt/ (see README).
# Adjust data.train_file / val_file / test_file to your H5 paths.

name: hza_tagger

model:
  lrs_config:
    initial: 1e-7
    max: 5e-4
    end: 1e-5
    pct_start: 0.01
    weight_decay: 1e-5

  model:
    class_path: salt.models.SaltModel
    init_args:
      init_nets:
        - input_name: tracks
          dense_config:
            output_size: &embed_dim 128
            hidden_layers: [128]
            activation: &activation ReLU

      encoder:
        class_path: salt.models.TransformerEncoder
        init_args:
          embed_dim: *embed_dim
          num_layers: 3
          out_dim: &out_dim 64
          mha_config:
            num_heads: 4
            attention: { class_path: salt.models.ScaledDotProductAttention }
          dense_config:
            activation: *activation

      pool_net:
        class_path: salt.models.GlobalAttentionPooling
        init_args: { input_size: *out_dim }

      tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: salt.models.ClassificationTask
              init_args:
                name: jets_classification
                input_name: jets
                label: a_jet
                class_names: [background, a_jet]
                use_class_dict: false
                loss:
                  class_path: torch.nn.CrossEntropyLoss
                dense_config:
                  input_size: *out_dim
                  output_size: 2
                  hidden_layers: [64, 32]
                  activation: *activation

data:
  train_file: data/train.h5
  val_file:   data/val.h5
  test_file:  data/test.h5

  norm_dict:  tagger/configs/norm_dict.yaml
  class_dict: null  # disable — inherited EOS path from salt/configs/base.yaml is not accessible

  # No class_dict needed for simple binary classification
  # (use_class_dict: false in the task above)

  # Labels to read from each input dataset
  # a_jet is stored as a field inside the jets H5 dataset
  labels:
    jets:
      - a_jet

  variables:
    jets:
      - pt
      - eta
      - phi
      - mass
    tracks:
      - pt
      - eta_rel
      - phi_rel
      - mass
      - charge
      - pdgId
      - dxy
      - dz
      - dxySig
      - dzSig
      - trkQuality
      - puppiWeight

  batch_size:  1024
  num_workers: 0
  num_train: -1
  num_val:   -1
  num_test:  -1

trainer:
  max_epochs: 100
  accelerator: auto   # set to "gpu" on NAF
  devices: 1
  log_every_n_steps: 50
  default_root_dir: logs

  # CometLogger — API key is read from the COMET_API_KEY environment variable
  # (set it in .env, which train.sh sources automatically).
  # Falls back to offline mode when no key is present.
  # Run name is injected by train.sh via --trainer.logger.init_args.experiment_name.
  logger:
    class_path: lightning.pytorch.loggers.CometLogger
    init_args:
      project_name: hza_tagger
      save_dir: logs
      offline: false
      display_summary_level: 0

  callbacks:
    - class_path: salt.callbacks.Checkpoint
      init_args:
        monitor_loss: val/jets_classification_loss
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args: { refresh_rate: 50 }
    - class_path: lightning.pytorch.callbacks.ModelSummary
      init_args: { max_depth: 2 }
